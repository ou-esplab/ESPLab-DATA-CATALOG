<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Observations</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<h1>Observations</h1>

<div id="dropdown-container"></div>
<div id="datasetList"></div>

<script>
const catalog = {"indices": {"mlso": {"_meta": {"name": "mlso", "long_name": "mlso", "description": "mlso", "units": "unknown", "date_range": "1979-01-01 to 2019-08-31", "files": 1, "data_location": "/data/esplab/shared/obs/indices/mlso"}}}, "gridded": {"atm": {"precip": {"daily": {"CMORPH": {"_meta": {"name": "CMORPH", "long_name": "NOAA Climate Data Record (CDR) of CPC Morphing Technique (CMORPH) High Resolution Global Precipitation Estimates", "description": "NOAA Climate Data Record (CDR) of CPC Morphing Technique (CMORPH) High Resolution Global Precipitation Estimates", "units": "mm/day", "date_range": "1998-01-01 to 2024-08-31", "files": 9740, "data_location": "/data/esplab/shared/obs/gridded/atm/precip/daily/CMORPH"}}, "CPC-UNI-CONUS-0.25deg": {"RT": {"_meta": {"name": "RT", "long_name": "Daily Accumulated Precipitation", "description": "Daily Accumulated Precipitation", "units": "mm", "date_range": "1948-01-01 to 2024-08-28", "files": 35, "data_location": "/data/esplab/shared/obs/gridded/atm/precip/daily/CPC-UNI-CONUS-0.25deg/RT"}}, "Normal": {"_meta": {"name": "CPC-UNI-CONUS-0.25deg", "long_name": "Daily Accumulated Precipitation", "description": "Daily Accumulated Precipitation", "units": "mm", "date_range": "1948-01-01 to 2006-12-31", "files": 59, "data_location": "/data/esplab/shared/obs/gridded/atm/precip/daily/CPC-UNI-CONUS-0.25deg"}}}, "CPC-UNI-GLOBAL": {"_meta": {"name": "CPC-UNI-GLOBAL", "long_name": "Daily total of precipitation", "description": "Daily total of precipitation", "units": "mm", "date_range": "1979-01-01 to 2023-09-28", "files": 45, "data_location": "/data/esplab/shared/obs/gridded/atm/precip/daily/CPC-UNI-GLOBAL"}}, "NASA-GPCP-v01r03": {"_meta": {"name": "NASA-GPCP-v01r03", "long_name": "NOAA Climate Data Record (CDR) of Daily GPCP Satellite-Gauge Combined Precipitation", "description": "NOAA Climate Data Record (CDR) of Daily GPCP Satellite-Gauge Combined Precipitation", "units": "mm/day", "date_range": "1996-10-01 to 2020-05-31", "files": 25, "data_location": "/data/esplab/shared/obs/gridded/atm/precip/daily/NASA-GPCP-v01r03"}}, "chirps-v2.0": {"p05": {"_meta": {"name": "p05", "long_name": "Climate Hazards group InfraRed Precipitation with Stations", "description": "Climate Hazards group InfraRed Precipitation with Stations", "units": "mm/day", "date_range": "1981-01-01 to 2024-12-31", "files": 44, "data_location": "/data/esplab/shared/obs/gridded/atm/precip/daily/chirps-v2.0/p05"}}, "p25": {"_meta": {"name": "p25", "long_name": "Climate Hazards group InfraRed Precipitation with Stations", "description": "Climate Hazards group InfraRed Precipitation with Stations", "units": "mm/day", "date_range": "1981-01-01 to 2024-12-31", "files": 44, "data_location": "/data/esplab/shared/obs/gridded/atm/precip/daily/chirps-v2.0/p25"}}}}, "monthly": {"CMAP": {"_meta": {"name": "CMAP", "long_name": "Average Monthly Rate of Precipitation", "description": "Average Monthly Rate of Precipitation", "units": "mm/day", "date_range": "1979-01-01 to 2025-07-01", "files": 1, "data_location": "/data/esplab/shared/obs/gridded/atm/precip/monthly/CMAP"}}, "CPC-UNI-HIRES": {"_meta": {"name": "CPC-UNI-HIRES", "long_name": "Monthly Average of Daily Accumulated Precipitation", "description": "Monthly Average of Daily Accumulated Precipitation", "units": "mm/day", "date_range": "1948-01-01 to 2022-10-01", "files": 1, "data_location": "/data/esplab/shared/obs/gridded/atm/precip/monthly/CPC-UNI-HIRES"}}, "GPCC": {"_meta": {"name": "GPCC", "long_name": "GPCC Precipitation: Monitoring Version 2020", "description": "GPCC Precipitation: Monitoring Version 2020", "units": "mm", "date_range": "1982-01-01 to 2023-08-01", "files": 1, "data_location": "/data/esplab/shared/obs/gridded/atm/precip/monthly/GPCC"}}, "NASA-GPCP-v3.2": {"_meta": {"name": "NASA-GPCP-v3.2", "long_name": "Average Monthly Rate of Precipitation", "description": "Average Monthly Rate of Precipitation", "units": "mm/day", "date_range": "1979-01-01 to 2023-09-01", "files": 1, "data_location": "/data/esplab/shared/obs/gridded/atm/precip/monthly/NASA-GPCP-v3.2"}}, "NOAA-PRECL": {"_meta": {"name": "NOAA-PRECL", "long_name": "Average Monthly Rate of Precipitation", "description": "Average Monthly Rate of Precipitation", "units": "mm/day", "date_range": "1948-01-01 to 2023-10-01", "files": 1, "data_location": "/data/esplab/shared/obs/gridded/atm/precip/monthly/NOAA-PRECL"}}}}}, "fluxes-radiation": {"OLR": {"daily": {"NOAA-interp-OLR": {"_meta": {"name": "NOAA-interp-OLR", "long_name": "Daily Mean OLR", "description": "Daily Mean OLR", "units": "W/m^2", "date_range": "1974-06-01 to 2022-12-31", "files": 1, "data_location": "/data/esplab/shared/obs/gridded/fluxes-radiation/OLR/daily/NOAA-interp-OLR"}}, "NOAA-noninterp-OLR": {"_meta": {"name": "NOAA-noninterp-OLR", "long_name": "Daily OLR", "description": "Daily OLR", "units": "W/m^2", "date_range": "2002-01-01 to 2023-07-26", "files": 1, "data_location": "/data/esplab/shared/obs/gridded/fluxes-radiation/OLR/daily/NOAA-noninterp-OLR"}}}}}, "ocn": {"SST": {"daily": {"NOAA-OISSTv2-HIRES": {"_meta": {"name": "NOAA-OISSTv2-HIRES", "long_name": "Daily Sea Surface Temperature", "description": "Daily Sea Surface Temperature", "units": "degC", "date_range": "1982-01-01 to 2023-07-26", "files": 42, "data_location": "/data/esplab/shared/obs/gridded/ocn/SST/daily/NOAA-OISSTv2-HIRES"}}}, "monthly": {"HADISST": {"_meta": {"name": "HADISST", "long_name": "sst", "description": "sst", "units": "C", "date_range": "1870-01-16 to 2024-01-16", "files": 1, "data_location": "/data/esplab/shared/obs/gridded/ocn/SST/monthly/HADISST"}}, "NOAA-ERSSTv5": {"_meta": {"name": "NOAA-ERSSTv5", "long_name": "Monthly Means of Sea Surface Temperature", "description": "Monthly Means of Sea Surface Temperature", "units": "degC", "date_range": "1854-01-01 to 2024-02-01", "files": 1, "data_location": "/data/esplab/shared/obs/gridded/ocn/SST/monthly/NOAA-ERSSTv5"}}, "NOAA-OISSTv2": {"_meta": {"name": "NOAA-OISSTv2", "long_name": "Monthly Mean of Sea Surface Temperature", "description": "Monthly Mean of Sea Surface Temperature", "units": "degC", "date_range": "1981-12-01 to 2023-01-01", "files": 1, "data_location": "/data/esplab/shared/obs/gridded/ocn/SST/monthly/NOAA-OISSTv2"}}}, "weekly": {"NOAA-OISSTv2": {"_meta": {"name": "NOAA-OISSTv2", "long_name": "Weekly Mean of Sea Surface Temperature", "description": "Weekly Mean of Sea Surface Temperature", "units": "degC", "date_range": "1981-10-29 to 2023-01-29", "files": 2, "data_location": "/data/esplab/shared/obs/gridded/ocn/SST/weekly/NOAA-OISSTv2"}}}}}}};
const STRUCTURE = {"indices": ["Index"], "gridded": ["Domain", "Variable", "Temporal Resolution", "Dataset", "Subdataset"]};

// Helper to clear and disable a select element
function clearSelect(sel, placeholder="-- Select --") {
    sel.innerHTML = `<option value="">${placeholder}</option>`;
    sel.disabled = true;
}

// Recursive function to create dropdowns dynamically with labels
function createDropdowns(container, dtype, path=[]) {
    const labels = STRUCTURE[dtype];
    const nextIndex = path.length;
    if (nextIndex >= labels.length) return;

    // Create a wrapper div for label + dropdown
    const wrapper = document.createElement("div");
    wrapper.style.display = "inline-block";
    wrapper.style.marginRight = "20px";
    
    // Create label
    const label = document.createElement("label");
    label.textContent = labels[nextIndex] + ":";
    label.style.marginRight = "10px";
    label.style.fontWeight = "bold";
    wrapper.appendChild(label);

    const sel = document.createElement("select");
    sel.id = "level" + nextIndex;
    sel.innerHTML = `<option value="">-- Select ${labels[nextIndex]} --</option>`;
    wrapper.appendChild(sel);
    container.appendChild(wrapper);

    sel.addEventListener("change", () => {
        // Remove any deeper dropdowns
        let deeper = nextIndex + 1;
        while (document.getElementById("level" + deeper)) {
            document.getElementById("level" + deeper).parentElement.remove();
            deeper++;
        }
        document.getElementById("datasetList").innerHTML = "";

        // Get current catalog node
        let node = catalog[dtype];
        for (let p of path) {
            node = node[p];
        }
        const val = sel.value;
        if (!val) return;

        // Check if there are child nodes (excluding _meta)
        const hasChildren = node[val] && Object.keys(node[val]).filter(k => k !== "_meta").length > 0;
        
        if (hasChildren) {
            // If there are child nodes, create the next dropdown level
            createDropdowns(container, dtype, path.concat([val]));
        } else if (node[val] && node[val]["_meta"]) {
            // Display metadata if we've reached a leaf node
            const meta = node[val]["_meta"];
            const div = document.createElement("div");
            div.className = "dataset-entry";
            div.style.marginTop = "20px";
            div.style.padding = "15px";
            div.style.backgroundColor = "#fffacd";
            div.style.border = "1px solid #ddd";
            div.style.borderRadius = "4px";
            div.innerHTML = `
                <div style="font-weight: bold; font-size: 1.1em; color: #841617;">${meta.name}</div>
                <div style="color: #000000;"><strong>Description:</strong> ${meta.long_name}</div>
                <div style="color: #000000;"><strong>Units:</strong> ${meta.units}</div>
                <div style="color: #000000;"><strong>Date Range:</strong> ${meta.date_range}</div>
                <div style="color: #000000;"><strong>Files:</strong> ${meta.files}</div>
                <div style="color: #000000;"><strong>Data Location:</strong> ${meta.data_location}</div>
            `;
            document.getElementById("datasetList").appendChild(div);
        }
    });

    // Populate the dropdown options for this level
    let node = catalog[dtype];
    for (let p of path) {
        node = node[p];
    }
    Object.keys(node).forEach(k => {
        if (k !== "_meta") {
            const option = document.createElement("option");
            option.value = k;
            option.textContent = k;
            sel.appendChild(option);
        }
    });
    sel.disabled = false;
}

// Initialize the dropdown container with the first dropdown for each dataset type
const container = document.getElementById("dropdown-container");
Object.keys(catalog).forEach(dtype => {
    const heading = document.createElement("h2");
    heading.textContent = dtype.charAt(0).toUpperCase() + dtype.slice(1);
    container.appendChild(heading);
    
    const dropdownWrapper = document.createElement("div");
    dropdownWrapper.style.marginBottom = "20px";
    container.appendChild(dropdownWrapper);
    
    createDropdowns(dropdownWrapper, dtype, []);
});
</script>
</body>
</html>
